apiVersion: v1alpha1
kind: Setting
metadata:
  name: plugin-timeFactor-settings
spec:
  forms:
    - group: basic
      label: 基本设置
      formSchema:
        - $el: a
          attrs:
            href: "https://docs.lik.cc"
            class: "py-4 block"
            target: "_blank"
            style:
              color: "#1890ff"
              fontSize: "0.875em"
              display: "flex"
              align-items: "center"
          children:
            - $el: span
              children: "查看 时间因子 帮助文档"
            - $el: img
              attrs:
                src: "/plugins/time-factor/assets/static/img/link.svg"
                width: "14px"
                height: "14px"
                style:
                  margin-left: "4px"
        - $el: span
          children: "Halo交流群"
        - $el: img
          attrs:
            src: "https://www.lik.cc/upload/iShot_2025-03-03_16.03.00.png"
            width: "100px"
            height: "120px"
            style:
              margin-left: "80px"
        - $formkit: switch
          label: 启用 canonical 链接
          name: enableCanonicalLink
          id: enableCanonicalLink
          key: enableCanonicalLink
          value: true
          help: "帮助搜索引擎识别内容的唯一地址，避免重复内容的 SEO 问题"
        - $formkit: switch
          if: "$enableCanonicalLink === true"
          label: 启用 alternate 链接
          name: enableAlternateLink
          id: enableAlternateLink
          key: enableAlternateLink
          value: false
          help: "为多语言网站提供内容的替代版本，提升国际化 SEO"
        - $formkit: array
          if: "$enableAlternateLink === true"
          label: 语言版本设置
          name: alternateLinks
          id: alternateLinks
          key: alternateLinks
          help: "为不同语言版本的内容添加 alternate 链接"
          children:
            - $formkit: text
              label: 语言代码
              name: langCode
              id: langCode
              key: langCode
              help: "例如：zh-cn、en、fr、de、x-default 等"
            - $formkit: text
              label: URL 地址模板
              name: urlTemplate
              id: urlTemplate
              key: urlTemplate
              value: "%URL%"
              help: "对应语言版本的完整 URL 地址；支持 %URL% 变量，代表当前内容的 URL"
        - $formkit: switch
          label: 启用百度时间因子
          name: enableBaiduTimeFactor
          id: enableBaiduTimeFactor
          key: enableBaiduTimeFactor
          value: true
          help: "百度搜索引擎系列时间因子"
        - $formkit: switch
          label: 启用 OG 时间因子
          name: enableOGTimeFactor
          id: enableOGTimeFactor
          key: enableOGTimeFactor
          value: true
          help: "主流搜索引擎系列时间因子"
        - $formkit: switch
          label: 启用 Meta 时间因子
          name: enableMetaTimeFactor
          id: enableMetaTimeFactor
          key: enableMetaTimeFactor
          value: true
          help: "头条等搜索引擎系列时间因子"
        - $formkit: switch
          label: 启用结构化数据
          name: enableStructuredData
          id: enableStructuredData
          key: enableStructuredData
          value: true
          help: "谷歌、Bing 等搜索引擎获取内容信息的方式"
        - $formkit: switch
          label: 启用 Twitter Cards
          name: enableTwitterCards
          id: enableTwitterCards
          key: enableTwitterCards
          value: true
          help: "Twitter/X 平台的内容展示卡片，提升社交媒体分享效果"
        - $formkit: select
          if: "$enableTwitterCards === true"
          label: Twitter Cards 类型
          name: twitterCardsType
          id: twitterCardsType
          key: twitterCardsType
          validation: "required"
          value: summary_large_image
          options:
            - label: 带大图的摘要卡片
              value: summary_large_image
            - label: 摘要卡片
              value: summary
          help: "选择适合内容的 Twitter/X Card 类型，提升社交媒体分享效果"
        - $formkit: text
          if: "$enableTwitterCards === true"
          label: 网站/公司的 Twitter/X 用户名
          name: twitterSiteUsername
          id: twitterSiteUsername
          key: twitterSiteUsername
          value: ""
        - $formkit: text
          if: "$enableTwitterCards === true"
          label: 网站/公司的 Twitter/X 用户 id
          name: twitterSiteUserId
          id: twitterSiteUserId
          key: twitterSiteUserId
          value: ""
        - $formkit: text
          if: "$enableTwitterCards === true"
          label: 内容作者的 Twitter/X 用户名
          name: twitterCreatorUsername
          id: twitterCreatorUsername
          key: twitterCreatorUsername
          value: ""
        - $formkit: text
          if: "$enableTwitterCards === true"
          label: 内容作者的 Twitter/X 用户 id
          name: twitterCreatorUserId
          id: twitterCreatorUserId
          key: twitterCreatorUserId
          value: ""
        - $formkit: attachment
          label: 默认封面图
          name: defaultImage
          id: defaultImage
          key: defaultImage
          help: "当没有设置封面图时使用"
        - $formkit: text
          label: 默认作者
          name: defaultAuthor
          id: defaultAuthor
          key: defaultAuthor
          value: ""
          help: "列表页、分类页、标签页等无具体作者的页面使用；留空时回退到站点名称"
    - group: seoOverrides
      label: SEO 覆盖
      formSchema:
        - $formkit: array
          label: 模板 SEO 覆盖
          name: seoOverrides
          id: seoOverrides
          key: seoOverrides
          help: "按模板 ID 手动指定标题/描述，优先级高于页面 <title> 标签和 <meta name=\"description\">"
          value:
            - templateId: categories
              title: 分类集合 - %SITENAME%
              description: 分类集合 - %SITEDESC%
            - templateId: tags
              title: 标签集合 - %SITENAME%
              description: 标签集合 - %SITEDESC%
            - templateId: archives
              title: 文章归档 - %SITENAME%
              description: 文章归档 - %SITEDESC%
            - templateId: moments
              title: 瞬间 - %SITENAME%
              description: 瞬间 - %SITEDESC%
            - templateId: moment
              title: 瞬间 - %SITENAME%
              description: 瞬间 - %SITEDESC%
            - templateId: photos
              title: 图库 - %SITENAME%
              description: 图库 - %SITEDESC%
            - templateId: friends
              title: 朋友圈 - %SITENAME%
              description: 朋友圈 - %SITEDESC%
            - templateId: douban
              title: "%TITLE%"
              description: "%TITLE% - %SITEDESC%"
            - templateId: bangumi
              title: 番剧 - %SITENAME%
              description: 番剧 - %SITEDESC%
          children:
            - $formkit: text
              label: 模板 ID
              name: templateId
              id: templateId
              key: templateId
              help: "例如：post、page、index、category、moments 等"
            - $formkit: text
              label: 标题
              name: title
              id: title
              key: title
              help: "留空则不覆盖；支持占位符：%TITLE%（页面标题）、%DESC%（页面描述）、%SITENAME%（站点标题）、%SITEDESC%（站点描述）"
            - $formkit: text
              label: 描述
              name: description
              id: description
              key: description
              help: "留空则不覆盖；支持占位符：%TITLE%（页面标题）、%DESC%（页面描述）、%SITENAME%（站点标题）、%SITEDESC%（站点描述）"
